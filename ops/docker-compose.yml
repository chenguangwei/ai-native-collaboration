# ☁️ 基础设施

此目录用于放置基础设施配置。

## 目录结构

```
ops/
├── docker-compose.yml    # 容器编排
├── /k8s/                # Kubernetes 配置
└── release-checklists.md # 发布检查单
```

---

## Docker Compose

```bash
# 启动所有服务
docker-compose up -d

# 查看日志
docker-compose logs -f

# 停止服务
docker-compose down
```

---

## 服务列表

| 服务 | 端口 | 说明 |
|------|------|------|
| api | 3000 | 后端 API |
| web | 80 | 前端 Web |
| db | 5432 | PostgreSQL |
| redis | 6379 | Redis 缓存 |
